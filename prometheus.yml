global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  
  - job_name: 'docker'
    static_configs:
      - targets: ['localhost:9323']
  
  - job_name: 'wordpress'
    static_configs:
      - targets: ['192.168.26.135:80']
  
  - job_name: 'jenkins'
    static_configs:
      - targets: ['192.168.26.135:8080']
  
  - job_name: 'elasticsearch'
    static_configs:
      - targets: ['192.168.26.135:9200']
